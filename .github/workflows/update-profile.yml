name: Update profile README

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: wadeKeith
        run: python scripts/update_readme.py

      - name: Commit changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain README.md assets/profile-stats.svg assets/profile-languages.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md assets/profile-stats.svg assets/profile-languages.svg
            git commit -m "chore: update profile README"
            git push
          fi
